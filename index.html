<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4facfe;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}

</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form onsubmit="return login()">

<div class="input-box">
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>
</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234"){
alert("Login Successful");
window.location="dashboard.html";
}
else{
alert("Invalid Login");
}

return false;
}

</script>

</body>
</html>
